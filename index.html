<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>US Armed Forces — Command Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0b0d12;--surface:#131720;--surface2:#1a2030;
  --border:#1e2638;--border2:#2a3450;
  --gold:#c8a84b;--gold-dim:#7a6530;--gold-glow:rgba(200,168,75,0.15);
  --blue:#4da6c8;--blue-dim:rgba(77,166,200,0.12);
  --text:#d0d9ee;--text-muted:#6a7a9a;--text-dim:#3a4560;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);pointer-events:none;z-index:999}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:11px 22px;background:linear-gradient(90deg,#0b0d12,#111520);border-bottom:1px solid var(--border2);position:relative;z-index:10}
.hdr-l{display:flex;align-items:center;gap:13px}
.hex{width:36px;height:36px;background:var(--gold);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:10px;color:#0b0d12;flex-shrink:0}
.htitle{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:18px;letter-spacing:2.5px;color:var(--gold);text-transform:uppercase}
.hsub{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-muted);letter-spacing:1.5px;margin-top:2px}
.warn{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--gold);background:rgba(200,168,75,.08);border:1px solid rgba(200,168,75,.22);padding:4px 12px;border-radius:2px}
.tabs{display:flex;gap:2px;padding:9px 22px 0;background:var(--bg);border-bottom:1px solid var(--border);position:relative;z-index:9}
.tab{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);padding:7px 18px;border-radius:4px 4px 0 0;cursor:pointer;border:1px solid transparent;border-bottom:none;transition:all .15s}
.tab:hover{color:var(--text);background:var(--surface)}
.tab.active{color:var(--gold);background:var(--surface);border-color:var(--border2);margin-bottom:-1px}
.shell{display:flex;height:calc(100vh - 83px)}
.org-view{display:flex;flex:1;overflow:hidden}
.org-view.hidden{display:none}
.matrix-view{display:none;flex:1;flex-direction:column;overflow:hidden;padding:18px 22px}
.matrix-view.active{display:flex}
.tree-panel{width:310px;min-width:240px;border-right:1px solid var(--border);overflow-y:auto;background:var(--surface);flex-shrink:0}
.tree-panel::-webkit-scrollbar{width:4px}.tree-panel::-webkit-scrollbar-thumb{background:var(--border2)}
.tree-section{border-bottom:1px solid var(--border)}
.tree-header{display:flex;align-items:center;gap:8px;padding:10px 13px;cursor:pointer;user-select:none;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:11px;letter-spacing:2px;text-transform:uppercase;transition:background .12s}
.tree-header:hover{background:var(--surface2)}
.svc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.chevron{margin-left:auto;font-size:9px;color:var(--text-muted);transition:transform .2s}
.tree-section.open .chevron{transform:rotate(90deg)}
.tree-children{display:none;padding:4px 0}
.tree-section.open .tree-children{display:block}
.tree-node{display:flex;align-items:center;gap:8px;padding:5px 13px 5px 26px;cursor:pointer;font-size:12px;transition:background .1s;position:relative}
.tree-node::before{content:'';position:absolute;left:19px;width:5px;height:1px;background:var(--border2)}
.tree-node:hover{background:var(--surface2)}
.tree-node.sel{background:var(--gold-glow);border-right:2px solid var(--gold)}
.tn-abbr{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--gold);min-width:70px;font-weight:500}
.tn-name{font-size:11px;color:var(--text-muted);line-height:1.3}
.detail-panel{flex:1;overflow-y:auto;padding:22px;background:var(--bg)}
.detail-panel::-webkit-scrollbar{width:4px}.detail-panel::-webkit-scrollbar-thumb{background:var(--border2)}
.placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;color:var(--text-dim)}
.ph-icon{font-size:44px;opacity:.3}.ph-txt{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:1.5px}
.dcard{display:none}.dcard.vis{display:block}
.dheader{display:flex;align-items:flex-start;margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.dbadge{padding:4px 10px;border-radius:2px;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#fff;white-space:nowrap;margin-right:14px;align-self:flex-start;margin-top:4px}
.dabbr{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:32px;letter-spacing:2px;color:var(--gold);line-height:1}
.dname{font-size:13px;color:var(--text-muted);margin-top:3px}
.dloc{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim);margin-top:6px}
.sec-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.mission-txt{font-size:13px;color:var(--text-muted);line-height:1.65;margin-bottom:20px}
.tags-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:20px}
.dtag{background:var(--blue-dim);border:1px solid rgba(77,166,200,.25);color:var(--blue);font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1px;padding:3px 9px;border-radius:2px;text-transform:uppercase}
.prow{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.pcard{background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:14px;position:relative;overflow:hidden}
.pcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.pcard.pri::before{background:var(--gold)}.pcard.dep::before{background:var(--blue)}
.prank{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;margin-bottom:5px}
.pname{font-size:13px;font-weight:600;color:var(--text)}.ptitle{font-size:10px;color:var(--text-muted);margin-top:2px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.iwidget{background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:14px}
.iwlabel{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;margin-bottom:8px}
.iwval{font-size:13px;font-weight:500}.iwsub{font-size:10px;color:var(--text-muted);margin-top:2px}
.budget-row{display:flex;align-items:center;gap:10px}
.bbar-wrap{display:flex;gap:3px}.bbar{width:9px;height:16px;background:var(--border);border-radius:1px}.bbar.on{background:var(--gold)}
.btier{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--gold)}
.acq-block{background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:14px;font-size:12px;color:var(--text-muted);line-height:1.65}
.mcontrols{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.flabel{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--text-dim)}
.fbtns{display:flex;gap:3px;flex-wrap:wrap}
.fbtn{background:var(--surface);border:1px solid var(--border);color:var(--text-muted);font-family:'JetBrains Mono',monospace;font-size:10px;padding:4px 9px;border-radius:2px;cursor:pointer;transition:all .12s}
.fbtn:hover{border-color:var(--border2);color:var(--text)}
.fbtn.on{background:var(--gold-glow);border-color:var(--gold-dim);color:var(--gold)}
.msearch{background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:11px;padding:6px 12px;border-radius:2px;outline:none;width:200px;margin-left:auto}
.msearch:focus{border-color:var(--gold-dim)}.msearch::placeholder{color:var(--text-dim)}
.mtable-wrap{overflow:auto;flex:1}
.mtable-wrap::-webkit-scrollbar{width:4px;height:4px}.mtable-wrap::-webkit-scrollbar-thumb{background:var(--border2)}
.mtable{width:100%;border-collapse:collapse;font-size:12px}
.mtable th{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);text-align:left;padding:9px 11px;border-bottom:1px solid var(--border2);position:sticky;top:0;background:var(--bg);white-space:nowrap;cursor:pointer;user-select:none}
.mtable th:hover{color:var(--text-muted)}
.mtable tr{border-bottom:1px solid var(--border);cursor:pointer;transition:background .08s}
.mtable tbody tr:hover{background:var(--surface)}
.mtable tbody tr.sel{background:var(--gold-glow)}
.mtable td{padding:7px 11px;vertical-align:middle}
.td-abbr{font-family:'JetBrains Mono',monospace;color:var(--gold);font-size:10px;font-weight:500;white-space:nowrap}
.td-pip{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle}
.td-svc{font-family:'JetBrains Mono',monospace;font-size:9px;white-space:nowrap}
.td-loc{font-size:10px;color:var(--text-muted);white-space:nowrap}
.td-ptags{display:flex;gap:3px;flex-wrap:wrap}
.td-tag{background:var(--blue-dim);border:1px solid rgba(77,166,200,.2);color:var(--blue);font-family:'JetBrains Mono',monospace;font-size:8px;padding:1px 6px;border-radius:2px;white-space:nowrap}
.td-pname{font-size:11px;color:var(--text)}.td-ptitle{font-size:9px;color:var(--text-muted)}
.mb-wrap{display:flex;gap:2px}.mb{width:5px;height:10px;background:var(--border);border-radius:1px}.mb.on{background:var(--gold)}
.td-acq{font-size:10px;color:var(--text-muted);max-width:170px}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>

var TREE = {
  DOD:  {label:'Dept. of Defense / IC',  ids:['osd','jcs','darpa','dia','nga','nsa']},
  ARMY: {label:'Army',                   ids:['hqda','forscom','tradoc','army-amc','inscom','arcyber','peo-c3t','peo-iews']},
  NAVY: {label:'Navy',                   ids:['opnav','navwar','navsea','navair','nawcad','nawcwd','navsup','navfac','onr']},
  USMC: {label:'Marine Corps',           ids:['hqmc','marcorsyscom','marforcom','marforpac']},
  USAF: {label:'Air Force',              ids:['haf','acc','afmc','aflcmc','afrl','af-amc','hanscom']},
  USSF: {label:'Space Force',            ids:['ocso','ssc','spoc','starcom']},
  USCG: {label:'Coast Guard',            ids:['cg-hq','lantarea','pacarea','cg-c5i']},
  JOINT:{label:'Combatant Commands',     ids:['indopacom','eucom','centcom','socom','cybercom','stratcom','spacecom','transcom','northcom','southcom','africom']}
};

var selId   = null;
var svcFilt = 'ALL';
var srch    = '';

function byId(id) {
  for (var i = 0; i < NODES.length; i++) {
    if (NODES[i].id === id) return NODES[i];
  }
  return null;
}

function bars(tier, mini) {
  var n = (tier === 'L') ? 3 : (tier === 'M') ? 2 : 1;
  var h = '';
  var cls = mini ? 'mb-wrap' : 'bbar-wrap';
  var b   = mini ? 'mb' : 'bbar';
  for (var i = 0; i < 3; i++) { h += '<div class="' + b + (i < n ? ' on' : '') + '"></div>'; }
  return '<div class="' + cls + '">' + h + '</div>';
}

function makeDomainTag(t, mini) {
  return '<span class="' + (mini ? 'td-tag' : 'dtag') + '">' + t + '</span>';
}

function buildTree() {
  var panel = document.getElementById('tree-panel');
  var h = '';
  var keys = Object.keys(TREE);
  for (var k = 0; k < keys.length; k++) {
    var svc = keys[k];
    var sec = TREE[svc];
    var c   = SVC_COLOR[svc];
    h += '<div class="tree-section" id="ts-' + svc + '">';
    h += '<div class="tree-header" onclick="toggleSec(\'' + svc + '\')">';
    h += '<div class="svc-dot" style="background:' + c + '"></div>';
    h += '<span style="color:' + c + '">' + sec.label + '</span>';
    h += '<span class="chevron">&#9658;</span></div>';
    h += '<div class="tree-children">';
    for (var j = 0; j < sec.ids.length; j++) {
      var nodeId = sec.ids[j];
      var nd = byId(nodeId);
      if (!nd) { continue; }
      var nm = (nd.name.length > 40) ? (nd.name.slice(0, 38) + '...') : nd.name;
      h += '<div class="tree-node" id="tn-' + nodeId + '" onclick="selectNode(\'' + nodeId + '\')">';
      h += '<span class="tn-abbr">' + nd.abbr + '</span>';
      h += '<span class="tn-name">' + nm + '</span></div>';
    }
    h += '</div></div>';
  }
  panel.innerHTML = h;
}

function toggleSec(svc) {
  var el = document.getElementById('ts-' + svc);
  if (el) { el.classList.toggle('open'); }
}

function selectNode(id) {
  var n = byId(id);
  if (!n) { return; }
  selId = id;

  var allNodes = document.querySelectorAll('.tree-node');
  for (var i = 0; i < allNodes.length; i++) { allNodes[i].classList.remove('sel'); }
  var tn = document.getElementById('tn-' + id);
  if (tn) { tn.classList.add('sel'); tn.scrollIntoView({block:'nearest'}); }

  var rows = document.querySelectorAll('#mtbody tr');
  for (var r = 0; r < rows.length; r++) {
    if (rows[r].getAttribute('data-id') === id) { rows[r].classList.add('sel'); }
    else { rows[r].classList.remove('sel'); }
  }

  document.getElementById('placeholder').style.display = 'none';
  var card = document.getElementById('dcard');
  card.classList.add('vis');

  var c       = SVC_COLOR[n.service];
  var lbl     = SVC_LABEL[n.service];
  var tierLbl = (n.budget === 'L') ? 'LARGE' : (n.budget === 'M') ? 'MEDIUM' : 'SMALL';
  var domTags = '';
  for (var d = 0; d < n.domains.length; d++) { domTags += makeDomainTag(n.domains[d], false); }

  var h = '';
  h += '<div class="dheader">';
  h += '  <div class="dbadge" style="background:' + c + '">' + lbl + '</div>';
  h += '  <div>';
  h += '    <div class="dabbr">' + n.abbr + '</div>';
  h += '    <div class="dname">' + n.name + '</div>';
  h += '    <div class="dloc">&#128205; ' + n.location + '</div>';
  h += '  </div>';
  h += '</div>';
  h += '<div class="sec-label">MISSION</div>';
  h += '<p class="mission-txt">' + n.mission + '</p>';
  h += '<div class="sec-label">DOMAINS</div>';
  h += '<div class="tags-row">' + domTags + '</div>';
  h += '<div class="sec-label">LEADERSHIP &nbsp;<span style="font-size:9px;color:var(--text-dim);font-weight:400">* verify current assignment</span></div>';
  h += '<div class="prow">';
  h += '  <div class="pcard pri">';
  h += '    <div class="prank">PRINCIPAL</div>';
  h += '    <div class="pname">' + n.leader.name + '</div>';
  h += '    <div class="ptitle">' + n.leader.title + '</div>';
  h += '  </div>';
  h += '  <div class="pcard dep">';
  h += '    <div class="prank">DEPUTY / 2IC</div>';
  h += '    <div class="pname">' + n.deputy.name + '</div>';
  h += '    <div class="ptitle">' + n.deputy.title + '</div>';
  h += '  </div>';
  h += '</div>';
  h += '<div class="info-grid">';
  h += '  <div class="iwidget">';
  h += '    <div class="iwlabel">BUDGET TIER</div>';
  h += '    <div class="budget-row">' + bars(n.budget, false) + '<span class="btier">' + tierLbl + '</span></div>';
  h += '  </div>';
  h += '  <div class="iwidget">';
  h += '    <div class="iwlabel">SERVICE BRANCH</div>';
  h += '    <div class="iwval" style="color:' + c + '">' + lbl + '</div>';
  h += '    <div class="iwsub">' + n.service + '</div>';
  h += '  </div>';
  h += '</div>';
  h += '<div class="sec-label">ACQUISITION / CONTRACTING NODE</div>';
  h += '<div class="acq-block">' + n.acq + '</div>';

  card.innerHTML = h;
}

function renderMatrix() {
  var lo  = srch.toLowerCase();
  var tb  = document.getElementById('mtbody');
  var out = '';
  for (var i = 0; i < NODES.length; i++) {
    var n    = NODES[i];
    var svOK = (svcFilt === 'ALL' || n.service === svcFilt);
    var srOK = true;
    if (lo) {
      var hay = (n.name + ' ' + n.abbr + ' ' + n.location + ' ' + n.domains.join(' ')).toLowerCase();
      srOK = (hay.indexOf(lo) > -1);
    }
    if (!svOK || !srOK) { continue; }
    var c    = SVC_COLOR[n.service];
    var tags = '';
    var mx   = (n.domains.length < 3) ? n.domains.length : 3;
    for (var d = 0; d < mx; d++) { tags += makeDomainTag(n.domains[d], true); }
    var isSel = (selId === n.id) ? 'sel' : '';
    out += '<tr data-id="' + n.id + '" onclick="selectAndShow(\'' + n.id + '\')" class="' + isSel + '">';
    out += '<td class="td-abbr">' + n.abbr + '</td>';
    out += '<td style="font-size:12px;color:var(--text)">' + n.name + '</td>';
    out += '<td><span class="td-pip" style="background:' + c + '"></span><span class="td-svc" style="color:' + c + '">' + n.service + '</span></td>';
    out += '<td class="td-loc">' + n.location + '</td>';
    out += '<td><div class="td-pname">' + n.leader.name + '</div><div class="td-ptitle">' + n.leader.title + '</div></td>';
    out += '<td><div class="td-pname">' + n.deputy.name + '</div><div class="td-ptitle">' + n.deputy.title + '</div></td>';
    out += '<td><div class="td-ptags">' + tags + '</div></td>';
    out += '<td>' + bars(n.budget, true) + '</td>';
    out += '<td class="td-acq">' + n.acq.split(' - ')[0] + '</td>';
    out += '</tr>';
  }
  tb.innerHTML = out;
}

function selectAndShow(id) {
  selId = id;
  selectNode(id);
  renderMatrix();
}

function buildFilters() {
  var wrap = document.getElementById('svc-filters');
  var svcs = ['ALL','DOD','ARMY','NAVY','USMC','USAF','USSF','USCG','JOINT'];
  var h = '';
  for (var i = 0; i < svcs.length; i++) {
    var s = svcs[i];
    var active = (s === 'ALL') ? ' on' : '';
    h += '<button class="fbtn' + active + '" onclick="setFilter(\'' + s + '\',this)">' + s + '</button>';
  }
  wrap.innerHTML = h;
}

function setFilter(svc, btn) {
  svcFilt = svc;
  var btns = document.querySelectorAll('#svc-filters .fbtn');
  for (var i = 0; i < btns.length; i++) { btns[i].classList.remove('on'); }
  btn.classList.add('on');
  renderMatrix();
}

function switchView(v) {
  var ov = document.getElementById('org-view');
  var mv = document.getElementById('matrix-view');
  var to = document.getElementById('tab-org');
  var tm = document.getElementById('tab-mat');
  if (v === 'org') {
    ov.classList.remove('hidden');
    mv.classList.remove('active');
    to.classList.add('active');
    tm.classList.remove('active');
  } else {
    ov.classList.add('hidden');
    mv.classList.add('active');
    to.classList.remove('active');
    tm.classList.add('active');
    renderMatrix();
  }
}

document.getElementById('tab-org').addEventListener('click', function() { switchView('org'); });
document.getElementById('tab-mat').addEventListener('click', function() { switchView('matrix'); });
document.getElementById('msearch').addEventListener('input', function() { srch = this.value; renderMatrix(); });

buildTree();
buildFilters();
renderMatrix();
toggleSec('DOD');
</script>
